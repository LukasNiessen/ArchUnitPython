version: 2
updates:
    - package-ecosystem: 'pip'
      directory: '/'
      schedule:
          interval: 'weekly'
      commit-message:
          prefix: 'fix'
          include: 'scope'
      labels:
          - 'dependencies'
      open-pull-requests-limit: 10

      groups:
          minor-and-patch:
              update-types:
                  - 'minor'
                  - 'patch'

      ignore:
          - dependency-name: '*'
            update-types:
                - 'version-update:semver-major'

    - package-ecosystem: 'github-actions'
      directory: '/'
      schedule:
          interval: 'weekly'
      commit-message:
          prefix: 'fix'
          include: 'scope'
      labels:
          - 'dependencies'
      open-pull-requests-limit: 10

      groups:
          actions-updates:
              patterns:
                  - '*'
